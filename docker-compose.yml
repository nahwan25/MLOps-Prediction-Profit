# docker-compose.yml (lengkap dengan secret_key)
x-airflow-common: &airflow-common
  image: apache/airflow:2.8.1
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags

    # 🔐 DUA SECRET KEY INI HARUS SAMA PERSIS DI SEMUA KOMPONEN
    # Ganti dengan nilai unik Anda (lihat cara membuatnya di bawah)
    AIRFLOW__WEBSERVER__SECRET_KEY: 'a7b5c3d9e1f2a8b4c6d0e3f7a1b9c4d8e2f5a6b7c8d9e0f1a2b3c4d5e6f7a8b9'
    AIRFLOW__API__SECRET_KEY: 'a7b5c3d9e1f2a8b4c6d0e3f7a1b9c4d8e2f5a6b7c8d9e0f1a2b3c4d5e6f7a8b9'

    # 📦 Pustaka Python yang dibutuhkan pipeline
    _PIP_ADDITIONAL_REQUIREMENTS: "pandas scikit-learn joblib pyyaml"

  volumes:
    - ./dag:/opt/airflow/dags          # mount folder dag lokal
  depends_on:
    postgres:
      condition: service_healthy
  networks:
    - airflow-network

services:
  postgres:
    image: postgres:13
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    ports:
      - "5433:5432"                     # host:container (port 5433 di host)
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 5s
      retries: 5
    restart: always
    networks:
      - airflow-network

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db init &&
        airflow users create \
          --username admin \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@example.com \
          --password admin
    restart: 'no'
    networks:
      - airflow-network

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8081:8080"                     # host:container (port 8081 di host)
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 10s
      timeout: 10s
      retries: 5
    restart: always
    networks:
      - airflow-network

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    healthcheck:
      test: ["CMD-SHELL", 'airflow jobs check --job-type SchedulerJob --hostname "$${HOSTNAME}"']
      interval: 10s
      timeout: 10s
      retries: 5
    restart: always
    networks:
      - airflow-network

networks:
  airflow-network:
    driver: bridge